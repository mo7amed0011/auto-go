    <style>
        :root {
            --bg-nav: rgba(9, 9, 11, 0.85);
            --border-nav: #18181b;
        }

        body {
            font-family: 'Inter', sans-serif;
            scroll-behavior: smooth;
            background-color: #09090b;
            color: #f4f4f5;
            transition: background-color 0.3s ease;
        }

        /* Essential Navbar Styling */
        .nav-glass {
            backdrop-filter: blur(16px) !important;
            -webkit-backdrop-filter: blur(16px) !important;
            z-index: 1000 !important;
        }

        /* Light Mode Overrides */
        body.light-mode {
            background-color: #ffffff !important;
            color: #111827 !important;
        }
        
        body.light-mode .nav-glass {
            background-color: rgba(255, 255, 255, 0.95) !important;
            border-bottom: 1px solid #e5e7eb !important;
        }

        body.light-mode .text-white { color: #111827 !important; }
        body.light-mode .text-zinc-400 { color: #4b5563 !important; }
        body.light-mode .bg-zinc-900 { background-color: #f3f4f6 !important; }
        body.light-mode .border-zinc-800 { border-color: #d1d5db !important; }

        /* Icons Visibility */
        body.light-mode i.fa-solid, 
        body.light-mode i.fa-brands,
        body.light-mode i.fa-regular {
            color: #111827 !important;
            opacity: 1 !important;
        }

        body.light-mode .text-blue-500,
        body.light-mode .text-blue-500 i {
            color: #2563eb !important;
        }

        /* Fixed Brand for Light Mode */
        body.light-mode .font-brand { color: #111827 !important; }
        
        .font-brand { font-family: 'Orbitron', sans-serif; }
        .font-arabic { font-family: 'Noto Sans Arabic', sans-serif; }

        /* Ensure sign-in button is always visible */
        .btn-signin-nav {
            background-color: #2563eb !important;
            color: #ffffff !important;
        }
